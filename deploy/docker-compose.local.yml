# Local override for production-style SV Gateway deployment.
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.local.yml \
#     --env-file deploy/.env.prod up -d --build sv-gateway
#
# This keeps the production sv-gateway image/env flow, but replaces the remote
# production database with a local Docker Postgres and publishes the gateway
# directly on localhost instead of using Caddy.

services:
  sv-gateway:
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: sv-gateway-postgres
    restart: always
    environment:
      POSTGRES_USER: sv_gateway
      POSTGRES_PASSWORD: sv_gateway_local
      POSTGRES_DB: sv_gateway
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sv_gateway -d sv_gateway"]
      interval: 5s
      timeout: 3s
      retries: 10
