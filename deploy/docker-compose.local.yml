# Local production-style SV Gateway deployment.
#
# Usage:
#   docker compose -f deploy/docker-compose.local.yml --env-file deploy/.env.prod up -d --build sv-gateway
#
# This keeps the production sv-gateway image/env flow, uses local Docker
# Postgres and Redis, and publishes the gateway directly on localhost instead
# of using Caddy. It is intentionally standalone so local commands do not need
# to remember a second compose override file.
# Local state uses fixed Docker-managed volumes so every worktree shares the
# same Postgres and Redis data instead of creating a separate ./pgdata folder.

services:
  sv-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sv-gateway
    restart: always
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: sv-gateway-postgres
    restart: always
    environment:
      POSTGRES_USER: sv_gateway
      POSTGRES_PASSWORD: sv_gateway_local
      POSTGRES_DB: sv_gateway
    volumes:
      - sv_gateway_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sv_gateway -d sv_gateway"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: sv-gateway-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - sv_gateway_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sv_gateway_pgdata:
    name: sv_gateway_pgdata
  sv_gateway_redisdata:
    name: sv_gateway_redisdata
